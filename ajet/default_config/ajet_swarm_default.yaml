# ------------------ main configuration ------------------
ajet:
  project_name: "ajet_default_project"
  experiment_name: "read_yaml_name"
  experiment_dir: "auto"  # {exp-dir}/{experiment_name}
  backbone: verl

  model:
    # which model should be trained
    path: "Qwen/Qwen2.5-7B-Instruct"

  rollout:
    # the path to the workflow class
    user_workflow: null
    # maximum number of parallel environments / simulate workers
    max_env_worker: 128
    # how many times a task should be repeated
    num_repeat: 4
    # monitor LLM's abormal behaviors during rollout
    compute_madness_checklist: ["nonsense"]
    # send signal to terminate context tracing when LLM is losing control
    agent_madness_termination: True # terminate_after_gone_mad
    # punish the LLM when it is detected as lost control
    agent_madness_reward: 0.0


  task_reader:
    type: random_dummy # `env_service` or `jsonl_dataset_file` or `huggingface_dat_repo` or `data_generation` or `random_dummy`

  task_judge:
    judge_type: customized_protocol  # Options: 'customized_protocol', 'rubrics_auto_grader'
    judge_protocol: null  # reward must come from remote user agent workflow, so set to null

  # the experimental ZeroMQ interchange server feature that allows `tuner.as_oai_baseurl_apikey` feature
  enable_interchange_server: True
  # train in cloud, run episode locally
  enable_swarm_mode: True
  # both swarm / oai share the same interchange server
  interchange_server:
    interchange_method: 'ipc' # options: 'tcp' (multi-nodes) or  'ipc' (1 node)
    interchange_server_port: 10086
    num_fastapi_process: 1  # 1, 2 or 4 is fine
    max_fastapi_threads: 512  # 64 or 128 is fine
    max_inference_tracker_threads: 64 # recommend to be equal to `ajet.rollout.max_env_worker`
    already_started: False # do not edit, used by `swarm`

  # the method to determine when to stop rollout in swarm mode. Options:
  # "rollout_until_finish_enough_episodes":
  #   AgentJet simply counts the number of completed episodes, and stop when it has collected [>= (ajet.data.train_batch_size * ajet.rollout.num_repeat)] samples
  # "rollout_until_finish_enough_tasks":
  #   AgentJet will identify the **task_id** of each episode, and stop when it has collected [>= ajet.data.train_batch_size] unique & FINISHED **task_id**.
  #     (Hint: a **task_id** is considered "FINISHED" when [>= ajet.rollout.num_repeat] episodes of this **task_id** have been completed.)
  # "rollout_until_finish_enough_non_dummy_tasks":
  #   AgentJet will identify the **task_id** of each episode, and stop when it has collected [>= ajet.data.train_batch_size] unique & FINISHED & NON-DUMMY **task_id**.
  #     (Hint: a **task_id** is considered "NON-DUMMY" at least one of **episodes** of **task_id** has **different** reward value.)
  # "rollout_until_any_client_agree_sync_weight":
  #   AgentJet defers the stop decision to swarm clients: stop as soon as ANY active swarm client has called `SwarmClient.agree_sync_weight()`.
  #     (Hint: a swarm client becomes "active" once it has successfully `end_episode`'d a rewarded (non-abort) episode since the last weight sync,
  #      and falls off the active list if it does no chat-completion / begin_episode for 10 minutes.)
  # "rollout_until_all_clients_agree_sync_weight":
  #   Like the above, but stop only when EVERY active swarm client has agreed (and there is at least one active client).
  swarm_mode_sample_collection_method: "rollout_until_finish_enough_tasks"

  data:
    # max number of tokens for prompt
    max_prompt_length: 3000
    # max number of tokens for response
    max_response_length: 15000
    # how many tasks per training batch
    train_batch_size: 32
    # [Hint]: The final number of samples per update will be: N_{sample} = (data.train_batch_size * rollout.num_repeat * rollout.multi_turn.expected_steps)

  trainer_common:
    logger: tensorboard
    n_gpus_per_node: 8
    algorithm:
      adv_estimator: grpo

# ------------------ do not edit ------------------
hydra:
  searchpath:
    - file://ajet/default_config
    - file://ajet/default_config/verl         # verl only

# ------------------ do not edit ------------------
defaults:
  - verl_default
  - ajet_default
  - _self_
